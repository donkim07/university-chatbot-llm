<div class="h-full flex-1 flex flex-col justify-between overflow-hidden">
  <!-- Chat Messages Box -->
  <div class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col justify-start">
    @for (msg of messages(); track $index) {
      <div
        class="flex flex-col max-w-[80%]"
        [ngClass]="{
          'self-end': msg.role === 'user',
          'self-start': msg.role === 'assistant'
        }"
      >
        <!-- Message Bubble -->
        <div
          class="px-5 py-3.5 rounded-2xl leading-relaxed text-sm whitespace-pre-wrap shadow-md shadow-black/10 transition-all"
          [ngClass]="{
            'bg-linear-to-br from-purple-600 to-blue-600 text-white rounded-br-none': msg.role === 'user',
            'bg-slate-900 border border-slate-800 text-slate-100 rounded-bl-none': msg.role === 'assistant' && msg.category !== 'Error',
            'bg-rose-500/10 border border-rose-500/20 text-rose-300 rounded-bl-none': msg.role === 'assistant' && msg.category === 'Error'
          }"
        >
          {{ msg.content }}
        </div>

        <!-- Meta Details and Rating Widget -->
        <div class="flex items-center gap-3 mt-1.5 px-1 text-[11px] text-slate-500">
          <span>{{ msg.timestamp }}</span>

          @if (msg.role === 'assistant' && msg.category !== 'Error') {
            <!-- RAG tag -->
            @if (msg.rag_used) {
              <span
                class="px-2 py-0.5 rounded bg-purple-500/10 border border-purple-500/20 text-purple-400 font-semibold tracking-wide text-[9px] uppercase"
              >
                RAG: {{ msg.category }}
              </span>
            }

            <span class="w-1.5 h-1.5 rounded-full bg-slate-800"></span>

            <!-- Feedback Rating Widget -->
            @if (!msg.rating) {
              <div class="flex items-center gap-1.5">
                <button
                  type="button"
                  (click)="rateMessage($index, 'Good')"
                  class="hover:text-emerald-400 transition-colors p-0.5 cursor-pointer"
                >
                  👍 Good
                </button>
                <button
                  type="button"
                  (click)="rateMessage($index, 'Average')"
                  class="hover:text-amber-400 transition-colors p-0.5 cursor-pointer"
                >
                  😐 Avg
                </button>
                <button
                  type="button"
                  (click)="rateMessage($index, 'Poor')"
                  class="hover:text-rose-400 transition-colors p-0.5 cursor-pointer"
                >
                  👎 Poor
                </button>
              </div>
            } @else {
              <span
                class="font-medium"
                [ngClass]="{
                  'text-emerald-400': msg.rating === 'Good',
                  'text-amber-400': msg.rating === 'Average',
                  'text-rose-400': msg.rating === 'Poor'
                }"
              >
                Rated: {{ msg.rating }}
              </span>
            }
          }
        </div>
      </div>
    }

    <!-- Generating Spinner -->
    @if (isLoading()) {
      <div class="self-start flex flex-col max-w-[80%]">
        <div
          class="px-5 py-4 rounded-2xl rounded-bl-none bg-slate-900 border border-slate-800 shadow-md flex items-center gap-2"
        >
          <div class="flex space-x-1.5">
            <div
              class="w-2 h-2 bg-purple-500 rounded-full animate-bounce"
              style="animation-delay: 0.1s"
            ></div>
            <div
              class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"
              style="animation-delay: 0.25s"
            ></div>
            <div
              class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce"
              style="animation-delay: 0.4s"
            ></div>
          </div>
        </div>
        <span class="mt-1 px-1 text-[10px] text-slate-500 italic">Thinking...</span>
      </div>
    }
  </div>

  <!-- Chat Input Area -->
  <footer class="p-6 border-t border-slate-900 bg-slate-950">
    <form (submit)="sendMessage()" class="max-w-4xl mx-auto flex gap-3 relative">
      <input
        type="text"
        name="query"
        [(ngModel)]="userQuery"
        [disabled]="isLoading() || systemStatus() === 'offline'"
        placeholder="Type a message to reply..."
        class="flex-1 bg-slate-900 border border-slate-800 hover:border-slate-700 focus:border-purple-500 outline-none rounded-full px-6 py-4 text-sm text-slate-100 placeholder-slate-500 transition-all shadow-inner focus:ring-1 focus:ring-purple-500/20"
      />

      <button
        type="submit"
        [disabled]="!userQuery().trim() || isLoading() || systemStatus() === 'offline'"
        class="bg-linear-to-r from-purple-600 to-blue-600 text-white rounded-full p-4 flex items-center justify-center shadow-lg hover:from-purple-500 hover:to-blue-500 transition-all hover:scale-105 active:scale-95 disabled:opacity-40 disabled:scale-100 disabled:pointer-events-none cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 transform rotate-90"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
          />
        </svg>
      </button>
    </form>
  </footer>
</div>
