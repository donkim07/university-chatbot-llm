<div class="h-full min-h-0 flex flex-col">
  <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain">
    <div class="max-w-3xl mx-auto px-4 py-8 sm:py-12 flex flex-col items-center">
      <div class="relative group mb-6 shrink-0">
        <div class="absolute -inset-0.5 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full blur-xl opacity-40 group-hover:opacity-75 transition duration-1000"></div>
        <div class="relative p-4 sm:p-5 rounded-full bg-slate-900 border border-slate-800 text-purple-400">
          <svg class="w-10 h-10 sm:w-12 sm:h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
      </div>

      <h2 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-center mb-2 bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent shrink-0">
        Welcome to UniSupport AI
      </h2>
      <p class="text-slate-400 text-sm text-center mb-8 max-w-lg leading-relaxed shrink-0">
        Ask any question about course registration, libraries, exam guidelines, fee structures, or campus hostels.
      </p>

      <div class="w-full max-w-2xl mb-6">
        <h4 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-4 text-center">Suggested Prompt Examples</h4>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 pb-4">
          @for (s of suggestions; track s.label) {
            <button
              type="button"
              (click)="sendQuery(s.query)"
              [disabled]="chatService.systemStatus() === 'offline' || isLoading()"
              class="p-4 bg-slate-900/50 hover:bg-slate-900 border border-slate-800 hover:border-purple-500/50 rounded-2xl text-left transition-all hover:scale-[1.02] active:scale-[0.98] cursor-pointer group flex flex-col gap-1 disabled:opacity-50"
            >
              <span class="text-sm font-semibold" [class]="s.color">{{ s.emoji }} {{ s.label }}</span>
              <span class="text-xs text-slate-400 line-clamp-2">"{{ s.query }}"</span>
            </button>
          }
        </div>
      </div>

      @if (isLoading()) {
        <div class="flex items-center gap-3 text-sm text-slate-400 bg-slate-900 border border-slate-800 px-6 py-3 rounded-2xl shrink-0">
          <div class="w-4 h-4 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
          Please wait...
        </div>
      }
    </div>
  </div>

  <footer class="shrink-0 p-4 sm:p-6 border-t border-slate-900 bg-slate-950">
    @if (inputError()) {
      <p class="max-w-2xl mx-auto mb-2 text-xs text-amber-400 px-2 text-center">{{ inputError() }}</p>
    }
    <form (ngSubmit)="onSubmit()" class="max-w-2xl mx-auto flex gap-3">
      <input
        type="text"
        name="query"
        [(ngModel)]="userQuery"
        [disabled]="isLoading() || chatService.systemStatus() === 'offline'"
        placeholder="Ask a question to start a new chat..."
        class="flex-1 min-w-0 bg-slate-900 border border-slate-800 hover:border-slate-700 focus:border-purple-500 outline-none rounded-full px-5 sm:px-6 py-3.5 sm:py-4 text-sm text-slate-100 placeholder-slate-500 transition-all shadow-inner focus:ring-1 focus:ring-purple-500/20"
      />
      <button
        type="submit"
        [disabled]="!userQuery().trim() || isLoading() || chatService.systemStatus() === 'offline'"
        class="shrink-0 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-full p-3.5 sm:p-4 shadow-lg hover:from-purple-500 hover:to-blue-500 transition-all hover:scale-105 active:scale-95 disabled:opacity-40 disabled:pointer-events-none cursor-pointer"
      >
        <svg class="w-5 h-5 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </form>
  </footer>
</div>
